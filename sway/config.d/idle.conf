# Window behavior
floating_modifier $mod normal

# OLED-friendly idle behavior: lock after 3 minutes, power displays off after 5 minutes.
exec swayidle -w \
    timeout 180 '~/.config/sway/scripts/lock.sh' \
    timeout 300 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    before-sleep '~/.config/sway/scripts/lock.sh'
